
<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="index.css">
	<title>Minimlist chat App</title>
</head>

<body>
<template id="msgTemplate">
	<pre class="msgCtn"></pre>
</template>
<div class="container">
	<form id="msgForm" class="msgForm">
		<textarea placeholder="Send message" class="input" id="inputBox" rows="3"></textarea>
		<input type="submit" class="btn" value="Send">
	</form>
	<hr/>
	<div id="messages" class="messages"></div>
</div>
<script type="text/javascript">
	const ws = new WebSocket( `ws://${ window.document.location.host }` );
	const msgTemplate = document.getElementById( 'msgTemplate' );
	const messagesEl = document.getElementById( 'messages' );

	function appendMessage( text ) {
		const msgEl = msgTemplate.content.cloneNode( true );
		msgEl.querySelector( 'pre' ).textContent = text;
		messagesEl.appendChild( msgEl );
	}

	ws.binaryType = "blob";
	ws.addEventListener( "open", () => {
		console.log( "Websocket connection opened" );
	} );
	ws.addEventListener( "close", () => {
		console.log( "Websocket connection closed" );
	} );
	ws.onmessage = function ( message ) {
		if ( message.data instanceof Blob ) {
			const reader = new FileReader();
			reader.onload = () => appendMessage( reader.result );
			reader.readAsText( message.data );
		} else {
			appendMessage( message.data );
		}
	};

	const form = document.getElementById( 'msgForm' );
	form.addEventListener( 'submit', ( event ) => {
		event.preventDefault();
		const inputBox = document.getElementById( 'inputBox' );
		const message = inputBox.value;
		if ( message.length === 0 ) {
			return;
		}
		ws.send( message );
		inputBox.value = '';
	} );
</script>
</body>

</html>
